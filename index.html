<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0e1320" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>Тайский алфавит — тренажёр письма</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header id="topbar">
    <button id="back" class="icon-btn">‹</button>
    <div id="title"></div>
    <div id="ver"></div>
    <button id="lang" class="icon-btn"></button>
    <div id="audio-slot"></div>
  </header>
  <main id="screen"></main>

  <!-- opentype.js как обычный скрипт: предоставляет глобальный объект `opentype` -->
  <script src="lib/opentype.min.js"></script>
  <script type="module" src="js/app.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("sw.js").catch(() => {});
      });
    }
  </script>
</body>
</html>
